# Copy to config/local.yaml and add your credentials
# config/local.yaml is gitignored
#
# New format (recommended): separate copilot and cardpointe credentials
profiles:
  default:
    production: false
    sitename: "cardpointe-uat"
    copilot:
      username: "your-copilot-username"
      password: "your-copilot-password"
      client_id: "your-client-id"
      client_secret: "your-client-secret"
    cardpointe:
      username: "your-gateway-username"
      password: "your-gateway-password"

